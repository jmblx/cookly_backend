<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация</title>
    <script src="https://yastatic.net/s3/passport-sdk/autofill/v1/sdk-suggest-with-polyfills-latest.js"></script>
    <link href="https://use.fontawesome.com/releases/v5.8.1/css/all.css" rel="stylesheet" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="/styles/common.css">
    <link rel="stylesheet" href="/styles/register.css">
    <link rel="stylesheet" href="/styles/login.css">
    <script type="module" src="/scripts/registerMain.js"></script>
    <script src="/scripts/manageParams.js"></script>
</head>
<body>
    <div class="container">
        <div class="form-container">
            <h1>Регистрация</h1>
            <form id="registrationForm">
                <div class="form-group">
                    <label for="email">Электронная почта</label>
                    <input type="email" class="form-control" id="email" placeholder="Введите вашу почту" required>
                </div>
                <div class="form-group">
                    <label for="password">Пароль</label>
                    <input type="password" class="form-control" id="password" placeholder="Введите пароль" required>
                </div>
                <button type="button" id="registerButton" class="btn btn-primary w-100">Зарегистрироваться</button>

            <div class="link text-center">
                <a href="/pages/login.html" id="login-link">Уже есть аккаунт? Войти</a>
            </div>
        </div>
    </div>

    <div class="modal fade" id="confirmEmailModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Подтверждение email</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>

                <div class="modal-body">
                    <div class="progress">
                        <div class="progress-bar" id="confirmProgress" style="width: 50%"></div>
                    </div>

                    <div class="step step1 active">
                        <p>Мы отправили 6-значный код на вашу почту. Введите его ниже.</p>
                        <div class="code-inputs">
                            <input type="text" maxlength="1" class="code-input" data-index="1">
                            <input type="text" maxlength="1" class="code-input" data-index="2">
                            <input type="text" maxlength="1" class="code-input" data-index="3">
                            <input type="text" maxlength="1" class="code-input" data-index="4">
                            <input type="text" maxlength="1" class="code-input" data-index="5">
                            <input type="text" maxlength="1" class="code-input" data-index="6">
                        </div>
                    </div>
                </div>

                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" id="cancelConfirmBtn">Отмена</button>
                    <button type="button" class="btn btn-primary" id="confirmCodeBtn">Подтвердить</button>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
