<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Управление референсом данных</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="/styles/clientRef.css">
    <link rel="stylesheet" href="/styles/adminPanel.css">
    <script type="module" src="/scripts/adminPanel.js"></script>
</head>
<body class="container mt-4">
    <div id="client-ref-container">
        <h1 id="client-ref-title" class="text-center mb-4"></h1>

        <!-- Кнопка возврата к клиенту -->
        <div class="mb-3">
            <button id="back-to-client-btn" class="btn btn-secondary">
                ← Вернуться к клиенту
            </button>
        </div>

        <div id="client-ref-form" class="card p-4">
            <!-- Информация о клиенте -->
            <div id="client-info-section" class="mb-4 p-3 bg-light rounded">
                <h5>Клиент: <span id="client-name-display"></span></h5>
            </div>

            <!-- Форма референса -->
            <div class="mb-3">
                <label for="ref-name-input" class="form-label">Название референса *</label>
                <input type="text" id="ref-name-input" class="form-control" placeholder="Введите название референса">
                <div class="form-text">Уникальное имя для идентификации референса</div>
            </div>

            <!-- Выбор user_scopes -->
            <div class="mb-4">
                <label class="form-label">User Scopes (выберите один или оба)</label>
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" id="scope-email" value="email">
                    <label class="form-check-label" for="scope-email">
                        email - доступ к email пользователя
                    </label>
                </div>
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" id="scope-avatar" value="avatar_path">
                    <label class="form-check-label" for="scope-avatar">
                        avatar_path - доступ к аватару пользователя
                    </label>
                </div>
                <div class="form-text">Выберите данные пользователя, которые будут доступны через этот референс</div>
            </div>

            <!-- Поиск и выбор Resource Servers -->
            <div class="mb-4 search-container"> <!-- Добавлен класс search-container -->
                <label class="form-label">Resource Servers *</label>

                <!-- Поле поиска -->
                <div class="input-group">
                    <input type="text" id="rs-search-input" class="form-control"
                           placeholder="Поиск ресурсных серверов...">
                    <!-- Иконка поиска будет добавлена через JS -->
                </div>
                <!-- Контейнер для результатов будет добавлен через JS прямо здесь -->

                <!-- Выбранные Resource Servers -->
                <div id="selected-rs-container">
                    <label class="form-label">Выбранные Resource Servers:</label>
                    <div id="selected-rs-list" class="selected-items-container">
                        <!-- Здесь будут отображаться выбранные RS -->
                    </div>
                </div>
                <div class="form-text">Выберите один или несколько ресурсных серверов для этого референса</div>
            </div>

            <!-- Кнопки действий -->
            <div class="d-flex justify-content-between mt-4">
                <button id="delete-ref-btn" class="btn btn-danger" style="display: none;">
                    Удалить референс
                </button>
                <div>
                    <button id="cancel-btn" class="btn btn-secondary me-2">
                        Отмена
                    </button>
                    <button id="save-ref-btn" class="btn btn-primary">
                        Сохранить референс
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="/scripts/clientRef.js"></script>
</body>
</html>
